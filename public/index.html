<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>daudio</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♪</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>daudio</h1>
      <div id="search-bar">
        <input type="text" id="search-input" placeholder="Search for music..." autocomplete="off">
        <button id="search-btn">Search</button>
      </div>
      <button id="sync-btn" title="Sync playlists from CSVs">Sync</button>
    </header>

    <div id="sync-bar" class="hidden">
      <div id="sync-bar-inner">
        <span id="sync-text">Syncing...</span>
        <div id="sync-progress"><div id="sync-progress-fill"></div></div>
        <span id="sync-count"></span>
      </div>
    </div>

    <main>
      <aside id="sidebar">
        <div id="sidebar-header">
          <h2>Sets</h2>
          <div id="sidebar-actions">
            <button id="new-set-btn" title="New set">+ Set</button>
            <button id="new-folder-btn" title="New folder">+ Folder</button>
          </div>
        </div>
        <div id="sets-tree"></div>
      </aside>

      <section id="content">
        <div id="search-results" class="hidden">
          <h2>Search Results</h2>
          <div id="results-list"></div>
        </div>
        <div id="library">
          <h2>Library</h2>
          <div id="library-list"></div>
        </div>
        <div id="welcome" class="hidden">
          <p>Search for music or browse your sets.</p>
        </div>
      </section>
    </main>

    <footer id="player-bar" class="hidden">
      <div id="player-info">
        <span id="player-title">&mdash;</span>
      </div>
      <div id="player-controls">
        <button id="play-pause-btn">&#9654;</button>
        <span id="player-time">0:00 / 0:00</span>
        <input type="range" id="seek-bar" min="0" max="100" value="0">
        <input type="range" id="volume-bar" min="0" max="100" value="80">
      </div>
      <div id="player-actions">
        <button id="save-btn" class="hidden" title="Save to set">Save</button>
      </div>
    </footer>
  </div>

  <div id="save-modal" class="modal hidden">
    <div class="modal-content">
      <h3>Save to Set</h3>
      <label>Filename
        <input type="text" id="save-filename">
      </label>
      <label>Set
        <select id="save-set"></select>
      </label>
      <label>Folder
        <select id="save-folder">
          <option value="">(root)</option>
        </select>
      </label>
      <div class="modal-actions">
        <button id="save-confirm-btn">Save</button>
        <button id="save-cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <div id="folder-modal" class="modal hidden">
    <div class="modal-content">
      <h3>New Folder</h3>
      <label>Set
        <select id="folder-set"></select>
      </label>
      <label>Folder name
        <input type="text" id="folder-name" placeholder="folder name">
      </label>
      <div class="modal-actions">
        <button id="folder-confirm-btn">Create</button>
        <button id="folder-cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <div id="set-modal" class="modal hidden">
    <div class="modal-content">
      <h3>New Set</h3>
      <label>Set name
        <input type="text" id="set-name" placeholder="e.g. Friday Night">
      </label>
      <div class="modal-actions">
        <button id="set-confirm-btn">Create</button>
        <button id="set-cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <div id="toast" class="hidden"></div>

  <script src="/js/api.js"></script>
  <script src="/js/player.js"></script>
  <script src="/js/browser.js"></script>
  <script src="/js/search.js"></script>
  <script src="/js/organizer.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
